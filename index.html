<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google.com</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 10vw; /* автоматично під розмір екрану */
      margin-bottom: 20px;
    }

    p {
      font-size: 5vw;
      color: #ff4d4d;
      font-weight: bold;
    }

    @media (min-width: 768px) {
      h1 {
        font-size: 60px;
      }
      p {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>
  <div>
    <h1>ВІТАЮ🚀</h1>
    <p>ВИ ПЕРЕЙШЛИ НА ФІШИНГОВИЙ САЙТ</p>
  </div>
</body>
</html>
